name: Docker Login Test

on:
  push:
    paths:
      - '.github/workflows/docker-login-test.yml'

jobs:
  login-test:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}