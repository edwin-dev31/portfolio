<!-- Hero Section -->
<app-hero />

<!-- Skills Section -->
<app-skills />

<!-- Projects Grid Section -->
<div class="container section-padding">
  <div class="section-header">
    <h2 class="section-title">Featured Projects</h2>
    <p class="section-subtitle">A collection of my recent work and personal projects.</p>
  </div>
  
  @if (isLoading()) {
    <div class="loading-state" role="status" aria-busy="true">
      <div class="spinner"></div>
      <p>Loading projects...</p>
    </div>
  } @else {
    <app-project-grid 
      [projects]="projects()" 
      (projectClick)="onProjectClick($event)" />
  }
</div>

<!-- Contact Section -->
<app-contact />

<!-- Project Detail Modal -->
@if (isModalOpen() && selectedProjectId()) {
  <app-project-detail 
    [projectId]="selectedProjectId()!" 
    (close)="closeModal()" />
}
