@if (isLoading()) {
  <div class="project-card project-card--skeleton">
    <div class="project-card__image-container">
      <div class="skeleton skeleton--image"></div>
    </div>
    <div class="project-card__content">
      <div class="skeleton skeleton--badge"></div>
      <div class="skeleton skeleton--title"></div>
      <div class="skeleton skeleton--description"></div>
      <div class="skeleton skeleton--tools"></div>
    </div>
  </div>
} @else {
  <article
    class="project-card"
    (click)="onCardClick()"
    (keydown.enter)="onCardClick()"
    tabindex="0"
    role="button"
    [attr.aria-label]="'View details for ' + project().title">

    <!-- Image Header -->
    <div class="project-card__image-container">
      <img
        [ngSrc]="project().image"
        [alt]="project().title"
        class="project-card__image"
        fill
        sizes="(max-width: 768px) 100vw, (max-width: 1200px) 50vw, 33vw" />
    </div>

    <!-- Content -->
    <div class="project-card__content">
      <span class="project-card__category">{{ project().category }}</span>
      <h3 class="project-card__title">{{ project().title }}</h3>
      <p class="project-card__description">{{ project().description }}</p>

      <div class="project-card__footer">
        <div class="project-card__tools">
          @for (tool of project().tools.slice(0, 3); track tool) {
            <span class="tool-tag">{{ tool }}</span>
          }
          @if (project().tools.length > 3) {
            <span class="tool-tag tool-tag--more">+{{ project().tools.length - 3 }}</span>
          }
        </div>
      </div>
    </div>
  </article>
}
